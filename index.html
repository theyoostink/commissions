<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Yoostink's Commissions Gallery</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">
	<style>
		body {
			background-color: #797E96;
			color: white;
			font-family: 'Roboto', sans-serif;
		}
		#sidebar-container {
			text-align: center;
		}
		#sidebar {
			background-color: #485276;
			padding-top: 20px;
			padding-bottom: 20px;
			border-bottom-left-radius: 10px;
			border-bottom-right-radius: 10px;
		}
		#gallery-container {
			background-color: #485276;
			border-bottom-left-radius: 10px;
			border-bottom-right-radius: 10px;
			padding-bottom: 5px;
			margin-bottom: 10px;
		}
		#gallery {
			/* Masonry Grid */
			-webkit-column-count: 5; /* Chrome, Safari, Opera */
			-moz-column-count: 5; /* Firefox */
			column-count: 5;
		}
		#gallery img {
			width: 100%;
			margin: 7px 0;
		}
		#gallery img:hover {
			filter: brightness(1.15);
			cursor: zoom-in;
		}
		#gallery-header {
			margin-top: 30px;
			margin-bottom: 15px;
		}
		#title {
			font-size: 24px;
		}
		.modal {
			text-align: center;
		}
		.modal-dialog {
			color: white;
			font-family: Arial;
			display: inline-block;
    		width: auto;
    		text-align: left;
		}
		.modal-content {
			background-color: #485276;
		}
		.modal-header {
			border-bottom: 1px solid #797E96;
		}
		.modal-footer {
			display: block;
		}
		.img-carousel-responsive {
			width: 90%;
			margin: auto;
		}
		.img-responsive {
			width: 100%;
			margin: auto;
		}
		.carousel-inner-padding {
			padding: 45px;
		}
		.imageModalFooterPadding {
			padding-top: 45px;
		}
		.hidden-image {
			display: none;
		}
		a {
			color: #b3bdff;
		}
		a:hover, a:active {
			color: #959ccf;
		}

		.checkbox-menu li label {
			display: block;
			padding: 3px 10px;
			clear: both;
			font-weight: normal;
			line-height: 1.42857143;
			color: #333;
			white-space: nowrap;
			margin:0;
			transition: background-color .4s ease;
		}
		.checkbox-menu li input {
			margin: 0px 5px;
			top: 2px;
			position: relative;
		}

		.checkbox-menu li.active label {
			background-color: #cbcbff;
			font-weight:bold;
		}

		.checkbox-menu li label:hover,
		.checkbox-menu li label:focus {
			background-color: #f5f5f5;
		}

		.checkbox-menu li.active label:hover,
		.checkbox-menu li.active label:focus {
			background-color: #b8b8ff;
		}

		#dropdownMenuLink {
			color: #fff;
			background-color: #666a80;
			border-color: #666a80;
		}
		#dropdownMenuLink:hover, #dropdownMenuLink:active, #dropdownMenuLink:focus {
			background-color: #797E96;
			border-color: #797E96;
		}
		#tags-dropdown {
			background-color: #e1e4f2;
		}

		@media (max-width: 767px) {
			/* Small devices (tablets, 768px and less) */
			#gallery {
				-webkit-column-count: 2; /* Chrome, Safari, Opera */
				-moz-column-count: 2; /* Firefox */
				column-count: 2;
			}
			#sidebar {
				border-bottom-left-radius: 0;
				border-bottom-right-radius: 0;
			}
			.img-carousel-responsive {
				width: 100%;
				margin: auto;
			}
			.carousel-inner {
				padding: 0px;
			}
			.imageModalFooterPadding {
				padding-top: 20px;
			}
		}
		@media (min-width: 768px) and (max-width: 991px) {
			/* Medium devices (desktops, 768px and up) */
			#gallery {
				-webkit-column-count: 3; /* Chrome, Safari, Opera */
				-moz-column-count: 3; /* Firefox */
				column-count: 3;
			}
			#sidebar {
				border-bottom-left-radius: 0;
				border-bottom-right-radius: 0;
			}
			.img-carousel-responsive {
				width: 97.5%;
				margin: auto;
			}
			.carousel-inner {
				padding: 45px;
			}
		}
		@media (min-width: 992px) and (max-width: 1199px) {
			/* Medium devices (desktops, 992px and up) */
			#title {
				font-size: 18px;
			}
			#gallery {
				-webkit-column-count: 3; /* Chrome, Safari, Opera */
				-moz-column-count: 3; /* Firefox */
				column-count: 3;
			}
		}
		@media (min-width: 1200px) and (max-width: 1399px) {
			/* Large devices (desktops, 992px and up) */
			#title {
				font-size: 20px;
			}
			#gallery {
				/* Masonry Grid */
				-webkit-column-count: 4; /* Chrome, Safari, Opera */
				-moz-column-count: 4; /* Firefox */
				column-count: 4;
			}
		}
		@media (min-width: 1400px) {
			/* Large devices (large desktops, 1200px and up) */
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="row">
			<div class="col-lg-2" id="sidebar-container">
				<div class="row">
					<div class="col-lg-1"></div>
					<div class="col-lg-10" id="sidebar">
						<h1 id="title"><strong>Yoostink's Commissions</strong></h1>
					</div>
					<div class="col-lg-1"></div>
				</div>
			</div>
			<div class="col-lg-10" id="gallery-container">
				<div class="row" id="gallery-header">
					<div class="col-lg-10">
						<h2><strong>Gallery</strong></h2>
					</div>
					<div class="col-lg-2">
						<div class="dropdown">
							<a class="btn dropdown-toggle" href="#" role="button" id="dropdownMenuLink" data-bs-toggle="dropdown" aria-expanded="false">
							Include:
							</a>

							<ul class="dropdown-menu checkbox-menu allow-focus" aria-labelledby="dropdownMenuLink" id="tags-dropdown"></ul>
						</div>
					</div>
				</div>
				<div class="row">
					<div id="gallery"></div>
				</div>
			</div>
		</div>
		<!-- Gallery Image Modal -->
		<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
			<div class="modal-dialog modal-xl">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title" id="imageModalLabel"></h5>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
					</div>
					<div class="modal-body">
						<div class="row">
							<div class="col-lg-8">
								<div id="modal-carousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="false">
									<div class="carousel-indicators"></div>
									<div class="carousel-inner" id="imageModalImage"></div>
									<button class="carousel-control-prev" type="button" data-bs-target="#modal-carousel" data-bs-slide="prev">
										<span class="carousel-control-prev-icon" aria-hidden="true"></span>
										<span class="visually-hidden">Previous</span>
									</button>
									<button class="carousel-control-next" type="button" data-bs-target="#modal-carousel" data-bs-slide="next">
										<span class="carousel-control-next-icon" aria-hidden="true"></span>
										<span class="visually-hidden">Next</span>
									</button>
								</div>
							</div>
							<div class="col-lg-4"><div id="imageModalFooter"></div></div>
						</div>
					</div>
				</div>
			</div>
		</div>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js" integrity="sha384-eMNCOe7tC1doHpGoWe/6oMVemdAVTMs2xqW4mwXrXsW0L84Iytr2wi5v2QjrP/xp" crossorigin="anonymous"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js" integrity="sha384-cn7l7gDp0eyniUwwAZgrzD06kc/tftFf19TOAs2zVinnD/C7E91j9yyk5//jjpt/" crossorigin="anonymous"></script>
	<script type="text/javascript" src="js/data.js"></script>

	<script type="text/javascript">
		$(document).ready(function() {
			// Display the images
			var gallery_html = "";
			var images = data.images;
			const tags = new Set();
			
			//shuffle(images);

			for (var i = 0; i < images.length; i += 1) {
				var image = images[i];
				var tags_class = image.tags.join(" ");
				for (var t = 0; t < image.tags.length; t += 1) {
					tags.add(image.tags[t]);
				}
				if (image.hidden) {
					tags_class += " hidden-image"
				}
				gallery_html += "<a data-bs-toggle='modal' data-bs-target='#imageModal' class='gallery-img'><img src='"+image.thumbnail+"' alt='"+image.alt+"' id='img"+i+"' index='"+i+"' class='"+tags_class+"'></a>";
			}
			$("#gallery").html(gallery_html);

			// Add a click listener to open a modal
			for (var i = 0; i < images.length; i += 1) {
				$("#img"+i).click(function() {
					var index = +($(this).attr("index"));
					$("#imageModalLabel").html(images[index].title);
					var src = images[index].src;
					var carousel_html = "";
					for (var j = 0; j < src.length; j += 1) {
						if (j == 0) {
							carousel_html += "<div class='carousel-item active'>";
						}
						else {
							carousel_html += "<div class='carousel-item'>";
						}

						if (src.length > 1) {
							carousel_html += "<img src='"+ src[j] +"' class='d-block img-carousel-responsive' alt='...'>";
						}
						else {
							carousel_html += "<img src='"+ src[j] +"' class='d-block img-responsive' alt='...'>";
						}
						carousel_html += "</div>"
						$("#imageModalImage").html(carousel_html);
					}
					if (src.length > 1) {
						$(".carousel-control-prev").show();
						$(".carousel-control-next").show();
						$(".carousel-indicators").show();
						var indicator_html = "";
						for (var j = 0; j < src.length; j += 1) {
							if (j == 0) {
								indicator_html += "<button type='button' data-bs-target='#modal-carousel' data-bs-slide-to='"+j+"' class='active' aria-current='true' aria-label='Slide "+(j+1)+"'></button>";
							}
							else {
								indicator_html += "<button type='button' data-bs-target='#modal-carousel' data-bs-slide-to='"+j+"' aria-label='Slide "+(j+1)+"'></button>";
							}
						}
						$(".carousel-indicators").html(indicator_html);
						$(".carousel-inner").addClass("carousel-inner-padding");
						$("#imageModalFooter").addClass("imageModalFooterPadding");
					}
					else {
						$(".carousel-control-prev").hide();
						$(".carousel-control-next").hide();
						$(".carousel-indicators").hide();
						$(".carousel-inner").removeClass("carousel-inner-padding");
						$("#imageModalFooter").removeClass("imageModalFooterPadding");
					}
					$("#imageModalFooter").html(getModalFooterText(images[index]));
					//enableTooltips();
				});
			}

			createTagsDropdown(tags);
		});

		function getModalFooterText(image) {
			text = "";
			if (image.src.length == 1) {
				text += "1 image<br/><br/>";
			}
			else {
				text += ""+image.src.length+" images<br/>";
			}
			text += "<strong>Artist:</strong> "+image.artist+"<br/>";

			if (image.artist_url == null) {
				text += "";
			}
			else {
				text += "<strong><a href='"+image.artist_url+"' data-bs-toggle='tooltip' data-bs-placement='right' title='"+image.artist_url+"' target='_blank'>Artist's Page</a></strong><br/>";
			}

			if (image.art_url == null) {
				text += "Artwork was not posted publicly.<br/>";
			}
			else {
				text += "<strong><a href='"+image.art_url+"' data-bs-toggle='tooltip' data-bs-placement='right' title='"+image.art_url+"' target='_blank'>Art Source</a></strong><br/>";
			}

			text += "<br/><strong>Description:</strong><br/>" + image.desc + "<br/>";

			text += "<br/>[" + image.date_str + "]<br/>";

			return text;
		}
		function enableTooltips() {
			var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
			var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
				return new bootstrap.Tooltip(tooltipTriggerEl)
			})
		}

		function shuffle(array) {
			var currentIndex = array.length,  randomIndex;
			// While there remain elements to shuffle...
			while (currentIndex != 0) {
				// Pick a remaining element...
				randomIndex = Math.floor(Math.random() * currentIndex);
				currentIndex--;
				// And swap it with the current element.
				[array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
			}

			return array;
		}

		function translateWord(word) {
			var translations = {
				hooters: "Hooters 🦉",
				nsfw: "NSFW 🔞"
			};
			if (word in translations) {
				return translations[word];
			}
			else {
				return word;
			}
		}

		function createTagsDropdown(tags) {
			tags.delete("");
			var tags_to_show = {};
			
			$(".hooters").hide();
			$(".nsfw").hide();

			//<li><label><input type="checkbox"> Cheese</label></li>
			var tags_dropdown_HTML = "";
			tags.forEach (function(value) {
				tags_dropdown_HTML += "<li><label><input type='checkbox' value='"+value+"'> "+translateWord(value)+"</label></li>"
				tags_to_show[value] = false;
			});
			$("#tags-dropdown").html(tags_dropdown_HTML);

			$(".checkbox-menu").on("change", "input[type='checkbox']", function() {
				var tag = $(this)[0].value;

				// If the tag is "nsfw" and is unchecked, then ask for 18+ confirmation
				if (tag == "nsfw" && $(this).closest("input").prop("checked")) {
					// The checked property is set to true at this call because clicking on the checkbox causes it to flip checked at this moment
					var nsfw_confirmation = confirm("By clicking OK, you are confirming that you are 18 years or older. Click Cancel if you are not.");
					//
					if (!nsfw_confirmation) {
						$(this).closest("input").prop("checked", false);
						return false;
					}
				}

				$(this).closest("li").toggleClass("active", this.checked);
				if ($(this).closest("li").hasClass("active")) {
					tags_to_show[tag] = true;
				}
				else {
					tags_to_show[tag] = false;
				}
				for (let key in tags_to_show) {
					if (tags_to_show[key]) {
						$("."+key).show();
					}
					else {
						$("."+key).hide();
					}
				}
			});
		}
	</script>
</body>
</html>
